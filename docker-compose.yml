services:
  # Laravel App
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sparkwash-app
    restart: unless-stopped
    working_dir: /var/www/sparkwash
    volumes:
      - .:/var/www/sparkwash
      - ./storage:/var/www/sparkwash/storage
    networks:
      - sparkwash-network
    depends_on:
      - mysql
      - redis
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - DB_HOST=mysql
      - DB_USERNAME=sparkwash
      - DB_PASSWORD=secret
      - REDIS_HOST=redis
      - QUEUE_CONNECTION=redis
      - SESSION_DRIVER=redis
      - CACHE_DRIVER=redis

  # Nginx
  nginx:
    image: nginx:alpine
    container_name: sparkwash-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/sparkwash
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf
    networks:
      - sparkwash-network
    depends_on:
      - app

  # MySQL
  mysql:
    image: mysql:8.0
    container_name: sparkwash-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: sparkwash
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_PASSWORD: secret
      MYSQL_USER: sparkwash
    ports:
      - "3307:3306"
    volumes:
      - sparkwash-mysql:/var/lib/mysql
    networks:
      - sparkwash-network

  # Redis
  redis:
    image: redis:7-alpine
    container_name: sparkwash-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - sparkwash-network

  # Queue Worker
  queue:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sparkwash-queue
    restart: unless-stopped
    working_dir: /var/www/sparkwash
    command: php artisan queue:work --sleep=3 --tries=3
    volumes:
      - .:/var/www/sparkwash
    networks:
      - sparkwash-network
    depends_on:
      - mysql
      - redis
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - DB_HOST=mysql
      - DB_USERNAME=sparkwash
      - DB_PASSWORD=secret
      - REDIS_HOST=redis
      - QUEUE_CONNECTION=redis

networks:
  sparkwash-network:
    driver: bridge

volumes:
  sparkwash-mysql:
    driver: local