---
- name: SparkWash Quick Deploy
  hosts: sparkwash
  become: yes

  vars:
    app_dir: /home/ec2-user/sparkwash-ai

  tasks:

    # ─── PULL LATEST CODE ────────────────────────
    - name: Pull latest code from GitHub
      git:
        repo: https://github.com/aftab-devloper/sparkwash-ai.git
        dest: "{{ app_dir }}"
        version: main
        force: yes

    # ─── RESTART CONTAINERS ──────────────────────
    - name: Restart Docker containers
      shell: |
        cd {{ app_dir }}
        docker compose down
        docker compose up -d --build
      args:
        executable: /bin/bash

    # ─── LARAVEL CACHE ───────────────────────────
    - name: Clear and cache Laravel config
      shell: |
        cd {{ app_dir }}
        docker compose exec -T app php artisan optimize:clear
        docker compose exec -T app php artisan optimize
      args:
        executable: /bin/bash

    # ─── DONE ────────────────────────────────────
    - name: Deploy complete
      debug:
        msg: "SparkWash deployed successfully! 🚀"
